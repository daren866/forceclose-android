name: ci

on:
  push:
    paths-ignore:
      - '**.md'
  pull_request:
    paths-ignore:
      - '**.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: environment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  job-common:
    runs-on: ubuntu-24.04
    outputs:
      SHORT_SHA: ${{ steps.expose_sha.outputs.short_sha }}
    steps:
      - name: expose short commit sha
        id: expose_sha
        run: |
          SHORT_SHA=${GITHUB_SHA::7}
          echo "short_sha=$SHORT_SHA" >> $GITHUB_ENV
          echo "SHORT_SHA=$SHORT_SHA" >> $GITHUB_OUTPUT

  build-android:
    needs: job-common
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      SHORT_SHA: ${{ needs.job-common.outputs.SHORT_SHA }}
    steps:
      - name: set environment variables
        run: |
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
          echo "RANDOM_NUMBER=$((1 + RANDOM % 100000))" >> $GITHUB_ENV
          echo "TIMESTAMP=$(date +'%Y%m%d%H%M%S')" >> $GITHUB_ENV

      - name: checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup jdk 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: cache gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: gradle-${{ runner.os }}-${{ hashFiles('/*.gradle*', '/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: cache gradle wrapper
        uses: actions/cache@v3
        with:
          path: ~/.gradle/wrapper
          key: gradle-wrapper-${{ runner.os }}-${{ hashFiles('**/gradle/wrapper/gradle-wrapper.properties') }}

      - name: make gradlew executable
        run: chmod +x ./gradlew

      - name: clean project
        run: ./gradlew clean

      - name: assemble debug artifact
        run: ./gradlew assembleDebug

      - name: assemble release artifact
        run: ./gradlew assembleRelease

      - name: upload artifacts to outputs
        uses: actions/upload-artifact@v4
        with:
          path: |
            app/build/outputs/apk
          retention-days: 90

      - name: expose version
        id: version
        run: ./gradlew -q printVersion | tee -a $GITHUB_ENV | tee -a $GITHUB_OUTPUT

      - name: expose apk path
        run: |
          echo "APK_PATH=$(find app/build/outputs/apk -name '*.apk' -type f -printf '%T@ %p\n' | sort -n | tail -1 | cut -d' ' -f2)" >> $GITHUB_ENV

      - name: create pre-release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: pre-${{ env.SHORT_SHA }}-${{ env.TIMESTAMP }}
          release_name: "${{ env.DATE }}-${{ env.RANDOM_NUMBER }} 更新了"
          draft: false
          prerelease: true
          body: |
            自动构建版本
            - 版本: ${{ env.VERSION_NAME }} (${{ env.VERSION_CODE }})
            - 分支: ${{ github.ref_name }}
            - 提交: ${{ env.SHORT_SHA }}

      - name: upload release asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.APK_PATH }}
          asset_name: app-${{ env.VERSION_NAME }}-${{ env.VERSION_CODE }}.apk
          asset_content_type: application/vnd.android.package-archive


